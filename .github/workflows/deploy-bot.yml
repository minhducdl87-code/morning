name: Deploy Caman to Cloudflare Worker

# Auto-deploys bot on push to main when files under bot/ change.
# Requires secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

"on":
  push:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/deploy-bot.yml"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          HAS_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ] && [ "$HAS_ACCOUNT" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Bot deploy SKIPPED — CF secrets not set. See bot/README.md."
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Deploy Worker + sync secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bot
          command: deploy
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_WEBHOOK_SECRET
            GEMINI_API_KEY
            OPENAI_API_KEY
            JINA_API_KEY
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET:  ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          JINA_API_KEY:             ${{ secrets.JINA_API_KEY }}

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WORKER_URL: https://caman-bot.minhducdl87.workers.dev
        run: |
          echo "Registering webhook → $WORKER_URL/webhook"
          resp=$(curl -sS \
            -d "url=$WORKER_URL/webhook" \
            -d "secret_token=$TELEGRAM_WEBHOOK_SECRET" \
            -d "drop_pending_updates=true" \
            -d 'allowed_updates=["message","edited_message"]' \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/setWebhook")
          echo "$resp" | jq . || echo "$resp"
          echo "$resp" | grep -q '"ok":true' || { echo "::error::setWebhook failed"; exit 1; }
