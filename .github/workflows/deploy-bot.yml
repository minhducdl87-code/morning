name: Deploy Caman to Cloudflare Worker

# Auto-deploys bot on push to main when files under bot/ change.
# Requires secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

"on":
  push:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/deploy-bot.yml"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          HAS_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          HAS_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
          HAS_KV_ID:   ${{ secrets.CF_KV_NAMESPACE_ID != '' }}
        run: |
          if [ "$HAS_TOKEN" = "true" ] && [ "$HAS_ACCOUNT" = "true" ] && [ "$HAS_KV_ID" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Bot deploy SKIPPED — CF secrets not set. See bot/README.md."
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: bot
        run: npm install
      - name: Inject KV namespace id
        working-directory: bot
        env:
          KV_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/$KV_ID/" wrangler.toml
      # Deploy new code FIRST so the new wrangler.toml (which no longer lists
      # ALLOWED_CHAT_IDS under [vars]) clears the stale plaintext var binding.
      # Otherwise `secret bulk` collides: a name can't be both var + secret (code 10053).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bot
          command: deploy

      # Now that the var is gone, upload secrets, then redeploy so the running
      # code has them. Idempotent on subsequent runs (name is already a secret).
      - name: Sync secrets + redeploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bot
          command: deploy
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_WEBHOOK_SECRET
            GEMINI_API_KEY
            OPENAI_API_KEY
            ALLOWED_CHAT_IDS
            JINA_API_KEY
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET:  ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          ALLOWED_CHAT_IDS:         ${{ secrets.ALLOWED_CHAT_IDS }}
          JINA_API_KEY:             ${{ secrets.JINA_API_KEY }}

      # Optional — only synced when the repo secret exists, so the deploy stays
      # green before you create the PAT. Cloudflare cron dispatch is a no-op
      # (dispatch.ts guards) until this is set.
      - name: Set GH_DISPATCH_TOKEN (optional — enables Cloudflare cron dispatch)
        working-directory: bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          if [ -n "$GH_DISPATCH_TOKEN" ]; then
            printf '%s' "$GH_DISPATCH_TOKEN" | npx wrangler secret put GH_DISPATCH_TOKEN
            echo "GH_DISPATCH_TOKEN synced — Cloudflare cron dispatch enabled."
          else
            echo "::notice::GH_DISPATCH_TOKEN not set — Cloudflare cron dispatch disabled until you add the repo secret."
          fi

      - name: Register Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          WORKER_URL: https://caman-bot.minhducdl87.workers.dev
        run: |
          echo "Registering webhook → $WORKER_URL/webhook"
          resp=$(curl -sS \
            -d "url=$WORKER_URL/webhook" \
            -d "secret_token=$TELEGRAM_WEBHOOK_SECRET" \
            -d "drop_pending_updates=true" \
            -d 'allowed_updates=["message","edited_message"]' \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/setWebhook")
          echo "$resp" | jq . || echo "$resp"
          echo "$resp" | grep -q '"ok":true' || { echo "::error::setWebhook failed"; exit 1; }
