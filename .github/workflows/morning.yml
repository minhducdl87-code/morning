name: Morning Digest

"on":
  schedule:
    - cron: '0 2 * * *'    # 9:00 AM Vietnam time (daily morning digest)
    - cron: '0 3 * * *'    # 10:00 AM Vietnam time (recap push to Telegram)
    - cron: '0 2 * * 0'    # 9:00 AM Vietnam time (Sunday — weekly trigger)
    - cron: '0 2 1 * *'    # 9:00 AM Vietnam time (1st of month — monthly trigger)
  workflow_dispatch:
    inputs:
      run_weekly:
        description: 'Also run weekly digest'
        type: boolean
        default: false
      run_monthly:
        description: 'Also run monthly rollup'
        type: boolean
        default: false
      backfill_month:
        description: 'Backfill specific month YYYY-MM (skip daily if set)'
        type: string
        default: ''

jobs:
  # ── 10AM recap: push top 3 items from latest card ──────────────────────────
  recap-push:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *'
    permissions:
      contents: read
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      NOTIFY_MODE: recap
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python notify-telegram.py

  # ── Daily digest ────────────────────────────────────────────────────────────
  daily-digest:
    runs-on: ubuntu-latest
    if: github.event.inputs.backfill_month == '' && github.event.schedule != '0 3 * * *'
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai

      - name: Generate daily card
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: python generate_card.py

      - name: Notify Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        run: python notify-telegram.py

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add cards.json
          git diff --staged --quiet || git commit -m "morning $(TZ='Asia/Ho_Chi_Minh' date '+%Y-%m-%d')"
          git push

  # ── Weekly digest (Sunday or manual) ───────────────────────────────────────
  weekly-digest:
    needs: daily-digest
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.schedule != '0 3 * * *' &&
      (github.event.schedule == '0 2 * * 0' ||
       github.event.inputs.run_weekly == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-genai

      - name: Pull latest
        run: git pull

      - name: Generate weekly digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_weekly.py

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add weekly.json
          git diff --staged --quiet || git commit -m "weekly $(TZ='Asia/Ho_Chi_Minh' date '+%Y-%m-%d')"
          git push

  # ── Monthly rollup (1st of month or manual) ────────────────────────────────
  monthly-digest:
    needs: [daily-digest, weekly-digest]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.schedule != '0 3 * * *' &&
      (github.event.schedule == '0 2 1 * *' ||
       github.event.inputs.run_monthly == 'true' ||
       github.event.inputs.backfill_month != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest
        run: git pull

      - name: Generate monthly digest
        run: |
          if [ -n "${{ github.event.inputs.backfill_month }}" ]; then
            python generate_monthly.py --backfill "${{ github.event.inputs.backfill_month }}"
          else
            python generate_monthly.py
          fi

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add monthly.json
          git diff --staged --quiet || git commit -m "monthly $(TZ='Asia/Ho_Chi_Minh' date '+%Y-%m-%d')"
          git push
