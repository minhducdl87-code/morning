<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cá Mặn Đau Lưng</title>
  <meta name="theme-color" content="#f4f7f5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=260717c">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <button class="icon-button nav-toggle" id="nav-toggle" type="button" aria-label="Mở kho bản tin" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <div class="brand-mark" aria-hidden="true">C</div>
      <div class="brand-copy">
        <strong id="site-title">Cá Mặn Đau Lưng</strong>
        <span id="today-label">Bản tin hôm nay</span>
      </div>
    </div>

    <label class="global-search" for="search-input">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"/><path d="m16 16 4 4"/></svg>
      <span class="sr-only">Tìm trong bản tin</span>
      <input id="search-input" type="search" placeholder="Tìm tin, nguồn hoặc chủ đề..." autocomplete="off">
      <kbd>/</kbd>
    </label>

    <div class="topbar-actions">
      <button class="text-button" id="mark-all-read" type="button">Đánh dấu đã đọc</button>
      <button class="icon-button" id="theme-toggle" type="button" aria-label="Đổi giao diện sáng tối" aria-pressed="false">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <div class="app-shell">
    <div class="nav-backdrop" id="nav-backdrop"></div>
    <div class="reader-backdrop" id="reader-backdrop"></div>
    <aside class="archive-pane" id="archive-pane" aria-label="Kho bản tin">
      <div class="pane-heading">
        <span class="eyebrow">Kho bản tin</span>
        <button class="icon-button pane-close" id="nav-close" type="button" aria-label="Đóng kho bản tin">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <nav id="archive-nav" aria-busy="true">
        <div class="loading-list" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <span class="sr-only" role="status" aria-live="polite">Đang tải kho bản tin</span>
      </nav>
      <div class="archive-note">
        <span class="status-dot"></span>
        <span>Cập nhật 9:00 &amp; 22:00</span>
      </div>
    </aside>

    <main class="feed-pane" id="feed-pane">
      <header class="feed-header">
        <div>
          <span class="eyebrow" id="feed-kicker">Hôm nay</span>
          <h1 id="feed-title">Bản tin đang tải</h1>
          <p id="feed-summary">Đang chuẩn bị danh sách tin đã chọn.</p>
        </div>
        <span class="count-badge" id="feed-count">—</span>
      </header>
      <div class="topic-strip" id="topic-strip" role="group" aria-label="Lọc theo chủ đề"></div>
      <div class="feed-list" id="feed-list" aria-label="Bảng tin buổi sáng" aria-busy="true">
        <div class="loading-dashboard" aria-hidden="true">
          <span class="loading-hero"></span>
          <span class="loading-card"></span>
          <span class="loading-card"></span>
        </div>
        <span class="sr-only" role="status" aria-live="polite">Đang dựng bảng tin buổi sáng</span>
      </div>
    </main>

    <article class="reader-pane" id="reader-pane" aria-label="Chi tiết tin" tabindex="-1">
      <div id="reader-content" class="reader-content">
        <div class="reader-empty">
          <span class="eyebrow">Morning desk</span>
          <h2>Chọn một tin để đọc nhanh</h2>
          <p>Tóm tắt, chi tiết bản tin và đường dẫn nguồn sẽ xuất hiện tại đây.</p>
        </div>
      </div>
    </article>
  </div>

  <div class="live-region sr-only" id="live-region" aria-live="polite"></div>
  <script src="date-week-utils.js?v=260717a"></script>
  <script src="renderers.js?v=260717b"></script>
  <script src="view-builder.js?v=260717b"></script>
  <script src="router-init.js?v=260717b"></script>
</body>
</html>
