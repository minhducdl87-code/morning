<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐡 Morning Digest</title>
<meta name="theme-color" content="#040d0a">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ pufferfish_report_theme v2 — Morning Digest ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Dark theme (default) ── */
:root{
  --bg:#040d0a;--bg2:#071510;--bg3:#0a1e18;
  --surface:#0a1e18;--surface2:#0e2820;
  --border:rgba(0,229,160,0.12);--border2:rgba(0,229,160,0.25);
  --text:#e8faf4;--text2:#9abfb0;--text3:#6aada0;
  --accent:#00e5a0;--accent2:#00b8ff;
  --green:#00e5a0;--yellow:#ffd166;--red:#ff4757;--blue:#00bcd4;--pink:#a88eff;--orange:#ff9800;
  --dot:rgba(0,229,160,0.10);
  --shadow:rgba(0,0,0,0.4);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --display:'Sora',system-ui,sans-serif;
  --body:'DM Sans',system-ui,sans-serif;
}
/* ── Light theme ── */
[data-theme="light"]{
  --bg:#f0f7f4;--bg2:#e4f0ea;--bg3:#ffffff;
  --surface:#ffffff;--surface2:#f0f9f5;
  --border:rgba(0,120,80,0.25);--border2:rgba(0,153,104,0.3);
  --text:#0a2018;--text2:#1a5040;--text3:#2d5c44;
  --accent:#009968;--accent2:#0077b8;
  --green:#1a6b3a;--yellow:#d4a017;--red:#c0202e;--blue:#0077b8;--pink:#7a5fd9;--orange:#7a3c00;
  --dot:rgba(0,140,85,0.07);
  --shadow:rgba(10,46,36,0.08);
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--body);min-height:100vh;
  font-size:15px;line-height:1.6;
  transition:background .3s,color .3s;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px);
  background-size:32px 32px;
}
body > *{position:relative;z-index:1}

/* ── Header ── */
.site-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:20px 16px 16px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:14px;border-left:3px solid var(--accent);padding-left:16px}
.header-logo{font-size:1.9rem;line-height:1}
.header-text{flex:1}
.header-text h1{
  font-family:var(--display);font-size:1.35rem;font-weight:800;
  color:var(--text);letter-spacing:-0.3px;
}
.header-text .tagline{
  font-family:var(--mono);font-size:.7rem;color:var(--accent);
  margin-top:4px;text-transform:uppercase;letter-spacing:2px;font-weight:600;
}
.theme-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:6px 12px;font-size:.95rem;
  cursor:pointer;transition:border-color .15s,color .15s;
  flex-shrink:0;color:var(--text2);
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── View nav (Daily / Weekly) ── */
.view-nav{max-width:720px;margin:0 auto;padding:14px 16px 0;display:flex;gap:8px}
.view-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;
  font-family:var(--mono);font-size:.72rem;font-weight:600;
  color:var(--text2);cursor:pointer;transition:all .15s;
  text-transform:uppercase;letter-spacing:1.5px;
}
.view-btn:hover,.view-btn.active{
  background:rgba(0,229,160,.08);border-color:var(--accent);color:var(--accent);
}
.view-btn.active{font-weight:700}

/* ── Date nav chips ── */
.date-nav{max-width:720px;margin:0 auto;padding:10px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.date-nav::-webkit-scrollbar{display:none}
.date-chip{
  flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
  font-family:var(--mono);font-size:.72rem;font-weight:600;
  color:var(--text2);cursor:pointer;transition:all .15s;
  white-space:nowrap;text-decoration:none;
}
.date-chip:hover,.date-chip.active{
  background:rgba(0,229,160,.08);border-color:var(--accent);color:var(--accent);
}
.date-chip.active{font-weight:700}

/* ── Main content ── */
main{max-width:720px;margin:0 auto;padding:20px 16px}
.loading,.empty,.error{
  text-align:center;padding:60px 20px;
  color:var(--text3);font-family:var(--mono);font-size:.9rem;
  letter-spacing:1px;
}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin-bottom:16px;overflow:hidden;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card:first-child{border-color:var(--border2);box-shadow:0 0 0 1px rgba(0,229,160,0.1)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;gap:12px}
.card-header:hover{background:var(--surface2)}
.card-date-wrap{display:flex;align-items:center;gap:10px}
.card-badge-today{
  background:var(--accent);color:var(--bg);
  font-family:var(--mono);font-size:.62rem;font-weight:800;
  padding:3px 9px;border-radius:20px;letter-spacing:1.2px;
  text-transform:uppercase;
}
.card-day{
  font-family:var(--mono);font-size:.68rem;color:var(--text3);
  font-weight:600;text-transform:uppercase;letter-spacing:1.5px;
}
.card-date-label{
  font-family:var(--display);font-size:1rem;font-weight:700;
  color:var(--text);margin-top:2px;
}
.card-toggle-btn{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:.7rem;flex-shrink:0;
  transition:all .15s;cursor:pointer;
}
.card-toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.card-body{display:none}
.card-body.open{display:block}

/* ── Sections ── */
.section{border-top:1px solid var(--border);padding:16px 18px}
.section-title{
  font-family:var(--mono);font-size:.65rem;font-weight:700;
  color:var(--accent);text-transform:uppercase;letter-spacing:2.5px;
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── News items ── */
.news-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
  transition:border-color .15s;
}
.news-item:last-child{margin-bottom:0}
.news-item:hover{border-color:var(--border2)}
.news-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.news-title{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.45;flex:1}
a.news-title{text-decoration:none;transition:color .15s}
a.news-title:hover{color:var(--accent);text-decoration:underline}

/* ── Tags ── */
.tag{
  display:inline-block;font-family:var(--mono);font-size:.6rem;
  padding:3px 8px;border-radius:20px;font-weight:700;
  white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;letter-spacing:1px;
}
.tag-hot{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3)}
.tag-api{background:rgba(0,229,160,.12);color:var(--accent);border:1px solid rgba(0,229,160,.28)}
.tag-feature{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.28)}
.tag-deprecate{background:rgba(255,204,2,.15);color:var(--yellow);border:1px solid rgba(255,204,2,.3)}
.tag-model{background:rgba(168,142,255,.12);color:var(--pink);border:1px solid rgba(168,142,255,.28)}
/* ── Gaming tags ── */
.tag-chart{background:rgba(0,188,212,.12);color:var(--blue);border:1px solid rgba(0,188,212,.28)}
.tag-monet{background:rgba(255,209,102,.15);color:var(--yellow);border:1px solid rgba(255,209,102,.3)}
.tag-gameplay{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.28)}
.tag-social{background:rgba(168,142,255,.12);color:var(--pink);border:1px solid rgba(168,142,255,.28)}
.tag-casual{background:rgba(0,188,212,.12);color:var(--blue);border:1px solid rgba(0,188,212,.28)}

/* ── News meta ── */
.news-desc{font-size:.82rem;color:var(--text2);line-height:1.6}
.news-source{
  font-family:var(--mono);font-size:.65rem;color:var(--text3);
  margin-top:6px;letter-spacing:0.5px;
}

/* ── Repo grid ── */
.repo-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:560px){.repo-grid{grid-template-columns:1fr 1fr}}
.repo-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
  transition:border-color .15s,transform .12s;
}
.repo-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.repo-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.repo-name{
  font-family:var(--mono);font-size:.78rem;font-weight:700;
  color:var(--accent);word-break:break-all;line-height:1.3;flex:1;
  text-decoration:none;
}
.repo-name:hover{color:var(--accent2);text-decoration:underline}
.repo-stars{
  font-family:var(--mono);font-size:.7rem;color:var(--yellow);
  font-weight:700;white-space:nowrap;
}
.repo-desc{font-size:.8rem;color:var(--text2);line-height:1.55;flex:1}
.repo-verdict{display:flex;align-items:flex-start;gap:8px;margin-top:2px}
.verdict{
  font-family:var(--mono);font-size:.62rem;font-weight:700;
  padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.8px;
}
.verdict-yes{background:rgba(0,229,160,.15);color:var(--green);border:1px solid rgba(0,229,160,.3)}
.verdict-maybe{background:rgba(255,209,102,.15);color:var(--yellow);border:1px solid rgba(255,209,102,.3)}
.verdict-skip{background:rgba(106,173,160,.15);color:var(--text3);border:1px solid rgba(106,173,160,.3)}
.verdict-reason{font-size:.75rem;color:var(--text3);line-height:1.45}

/* ── Footer ── */
footer{
  text-align:center;padding:32px 16px 24px;
  color:var(--text3);font-family:var(--mono);font-size:.68rem;
  border-top:1px solid var(--border);max-width:720px;margin:16px auto 0;
  letter-spacing:1px;text-transform:uppercase;
}

/* ── Responsive ── */
@media(max-width:640px){
  body{font-size:14px}
  .header-text h1{font-size:1.15rem}
  .card-date-label{font-size:.92rem}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">🐡</div>
    <div class="header-text">
      <h1>Morning Digest</h1>
      <div class="tagline" id="tagline">Claude News · GitHub Hot · 5AM daily</div>
    </div>
    <button class="theme-btn" id="theme-btn" title="Đổi giao diện" onclick="toggleTheme()">☀️</button>
  </div>
</header>
<div class="view-nav">
  <button class="view-btn active" id="btn-daily"  onclick="setView('daily')">📅 Hàng ngày</button>
  <button class="view-btn"        id="btn-weekly" onclick="setView('weekly')">📊 Tuần</button>
</div>
<div class="date-nav" id="date-nav"></div>
<main id="main"><div class="loading">⏳ Đang tải...</div></main>
<main id="main-weekly" style="display:none"></main>
<footer>🤖 Tự động bởi Lèo · minhducdl87-code/morning · Rolling 30 ngày</footer>
<script src="digest.js"></script>
</body>
</html>
