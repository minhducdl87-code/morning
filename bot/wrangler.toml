name = "caman-bot"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# KV binding for per-user state (memory + rate limit + cache)
# Create: wrangler kv namespace create STATE
# Repo is public — do NOT commit the real namespace id here.
# Local dev/deploy: replace the placeholder below with your real id, but
# revert before committing (e.g. `git checkout -- wrangler.toml` after testing).
# CI deploy: injected from the CF_KV_NAMESPACE_ID GitHub secret (see
# .github/workflows/deploy-bot.yml + bot/README.md "Secrets & KV" section).
[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Public env (safe to commit — no secrets, no user-identifying data here)
[vars]
BOT_USERNAME       = "caman_bot"
SITE_BASE_URL      = "https://minhducdl87-code.github.io/morning"
GEMINI_MODEL       = "gemini-2.5-flash"
OPENAI_CHAT_MODEL  = "gpt-4o-mini"
OPENAI_DEEP_MODEL  = "gpt-4o"
OPENAI_IMAGE_MODEL = "dall-e-3"
OPENAI_STT_MODEL   = "whisper-1"
GH_REPO            = "minhducdl87-code/morning"

# Cron triggers (Kiểu A): Worker wakes up at these times and dispatches the
# morning.yml GitHub Actions workflow (via GH_DISPATCH_TOKEN) instead of doing
# the generation work itself — GitHub Actions cron stays the source of truth
# (backup), this is just a more reliable wake-up call.
[triggers]
crons = ["0 2 * * *", "0 15 * * *"]

# Secrets (set via: wrangler secret put NAME) — never commit real values
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_WEBHOOK_SECRET   (random string, also set in Telegram setWebhook)
#   GEMINI_API_KEY
#   OPENAI_API_KEY
#   ALLOWED_CHAT_IDS          (comma-separated whitelist chat IDs — moved out of
#                              [vars] since this repo is public)
#   JINA_API_KEY              (optional, for URL summary)
#   GH_DISPATCH_TOKEN         (optional — GitHub fine-grained PAT with Actions
#                              read/write, used by the cron trigger to dispatch
#                              morning.yml. Missing → cron logs an error and
#                              no-ops, webhook path is unaffected.)
